<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; }
    .box {
      display: inline-block;
      width: 50px;
      height: 50px;
      background-color: blue;
      border: 2px solid red;
      margin: 5px;
    }
    .text {
      font-size: 24px;
      color: green;
    }
    .small-text {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>
  <div>
    This is a normal text line.
    <span class="text">This is a larger span text.</span>
    <div class="box"></div>
    <span class="small-text">This is smaller text.</span>
    And we want to see if the inline-block and text wrap correctly when the line is too long to fit in 800 pixels.
    <div class="box" style="height: 100px; background-color: purple;"></div>
    Here is a taller inline-block that should push the line height up!
  </div>
</body>
</html>
